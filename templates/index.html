<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Resume Roast AI</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(
                135deg,
                #0f0f0f,
                #1c1c1c
            );

            color: white;

            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            padding: 30px;
        }

        .container {

            width: 100%;
            max-width: 850px;

            background: #181818;

            border-radius: 20px;

            padding: 40px;

            box-shadow:
                0 0 25px rgba(255, 0, 0, 0.15);
        }

        h1 {

            font-size: 48px;

            margin-bottom: 10px;

            color: #ff4d4d;
        }

        .subtitle {

            color: #bbbbbb;

            margin-bottom: 30px;

            line-height: 1.6;
        }

        .upload-box {

            background: #242424;

            border: 2px dashed #ff4d4d;

            border-radius: 15px;

            padding: 35px;

            text-align: center;

            margin-bottom: 30px;
        }

        input[type="file"] {

            margin-bottom: 20px;

            color: white;
        }

        button {

            background: #ff4d4d;

            color: white;

            border: none;

            padding: 14px 28px;

            border-radius: 10px;

            font-size: 16px;

            cursor: pointer;

            transition: 0.3s;
        }

        button:hover {

            background: #ff1f1f;

            transform: scale(1.03);
        }

        .results-title {

            margin-bottom: 20px;

            color: #ff8080;
        }

        .roast-card {

            background: #222;

            border-left: 6px solid #ff4d4d;

            padding: 20px;

            margin-bottom: 20px;

            border-radius: 12px;

            animation: fadeIn 0.4s ease;
        }

        .roast-card h3 {

            margin-bottom: 10px;

            color: #ff6666;
        }

        .roast-card p {

            color: #dddddd;

            line-height: 1.7;
        }

        @keyframes fadeIn {

            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Resume Roast AI 🔥</h1>

        <p class="subtitle">
            Upload your resume and let the AI expose every
            weak bullet point, fake buzzword, and suspiciously
            vague achievement you tried to sneak past recruiters.
        </p>

        <form method="POST" enctype="multipart/form-data">

            <div class="upload-box">

                <input
                    type="file"
                    name="resume"
                    accept=".pdf"
                    required
                >

                <br>

                <button type="submit">
                    Roast My Resume
                </button>

            </div>

        </form>

        {% if roasts %}

            <h2 class="results-title">
                Roast Results
            </h2>

            {% for roast in roasts %}

                <div class="roast-card">

                    <h3>{{ roast.title }}</h3>

                    <p>{{ roast.message }}</p>

                </div>

            {% endfor %}

        {% endif %}

    </div>

</body>

</html>
